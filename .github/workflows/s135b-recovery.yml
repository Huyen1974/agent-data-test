name: "S135B: VPS Recovery"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    name: Recover VPS Services
    runs-on: ubuntu-latest
    steps:
      - name: Recover all services
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/incomex/docker

            echo "=== Current container status ==="
            docker ps -a --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" | head -10

            echo ""
            echo "=== Checking postgres ==="
            if docker exec postgres pg_isready -U postgres 2>/dev/null; then
              echo "Postgres: READY"
            else
              echo "Postgres: NOT READY — restarting..."
              docker compose restart postgres
              sleep 10
              docker exec postgres pg_isready -U postgres || echo "Still not ready"
            fi

            echo ""
            echo "=== Restarting all services ==="
            docker compose down
            sleep 5
            docker compose up -d

            echo "Waiting 90s for full warm-up..."
            sleep 90

            echo ""
            echo "=== Health checks ==="
            # Postgres
            if docker exec postgres pg_isready -U postgres 2>/dev/null; then
              echo "Postgres: READY"
            else
              echo "Postgres: FAILED"
            fi

            # Directus
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8055/server/health 2>/dev/null || echo "000")
            echo "Directus (direct): HTTP $HTTP"

            # Agent Data
            HTTP2=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/info 2>/dev/null || echo "000")
            echo "Agent Data (direct): HTTP $HTTP2"

            # Via nginx
            HTTP3=$(curl -s -o /dev/null -w "%{http_code}" https://vps.incomexsaigoncorp.vn/api/health 2>/dev/null || echo "000")
            echo "Agent Data (nginx): HTTP $HTTP3"

            echo ""
            echo "=== Container status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | head -10

            echo ""
            echo "=== Directus logs (last 10) ==="
            docker logs --tail 10 incomex-directus 2>&1

            echo ""
            echo "=== Agent Data logs (last 10) ==="
            docker logs --tail 10 incomex-agent-data 2>&1
