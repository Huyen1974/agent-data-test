name: "S135B: Rotate Directus Secrets on VPS"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    name: Rotate Directus Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Update VPS .env and restart Directus
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        env:
          NEW_DIRECTUS_KEY: ${{ secrets.DIRECTUS_KEY }}
          NEW_DIRECTUS_SECRET: ${{ secrets.DIRECTUS_SECRET }}
          NEW_DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_ADMIN_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          envs: NEW_DIRECTUS_KEY,NEW_DIRECTUS_SECRET,NEW_DIRECTUS_ADMIN_TOKEN
          script: |
            set -euo pipefail
            cd /opt/incomex/docker

            echo "=== Backup current .env ==="
            cp .env .env.bak.$(date +%Y%m%dT%H%M%S)

            echo "=== Updating .env with new secrets ==="
            # Update DIRECTUS_KEY
            sed -i "s|^DIRECTUS_KEY=.*|DIRECTUS_KEY=${NEW_DIRECTUS_KEY}|" .env
            # Update DIRECTUS_SECRET
            sed -i "s|^DIRECTUS_SECRET=.*|DIRECTUS_SECRET=${NEW_DIRECTUS_SECRET}|" .env
            # Update DIRECTUS_ADMIN_TOKEN
            sed -i "s|^DIRECTUS_ADMIN_TOKEN=.*|DIRECTUS_ADMIN_TOKEN=${NEW_DIRECTUS_ADMIN_TOKEN}|" .env

            echo "Verify .env updated:"
            grep "^DIRECTUS_KEY=" .env | cut -c1-20
            grep "^DIRECTUS_SECRET=" .env | cut -c1-24
            grep "^DIRECTUS_ADMIN_TOKEN=" .env | cut -c1-28

            echo ""
            echo "=== Update agent-data docker-compose env ==="
            python3 -c "
            import yaml, os
            with open('docker-compose.yml') as f:
                dc = yaml.safe_load(f)
            svc = dc['services']['agent-data']
            env = svc.get('environment', {})
            if isinstance(env, list):
                env_dict = {}
                for item in env:
                    k, v = item.split('=', 1)
                    env_dict[k] = v
                env = env_dict
            env['DIRECTUS_ADMIN_TOKEN'] = os.environ['NEW_DIRECTUS_ADMIN_TOKEN']
            svc['environment'] = env
            with open('docker-compose.yml', 'w') as f:
                yaml.dump(dc, f, default_flow_style=False, sort_keys=False)
            print('agent-data DIRECTUS_ADMIN_TOKEN updated in compose')
            "

            echo ""
            echo "=== Restarting Directus + Agent Data (no postgres restart) ==="
            # Stop only directus and agent-data, then start them
            docker compose stop directus agent-data
            docker compose up -d directus agent-data

            echo "Waiting 60s for Directus warm-up..."
            sleep 60

            echo ""
            echo "=== Health Checks ==="
            # Test Directus health via internal port
            RETRIES=0
            while [ $RETRIES -lt 5 ]; do
              if docker exec incomex-directus wget -q -O /dev/null http://localhost:8055/server/health 2>/dev/null; then
                echo "Directus: HEALTHY"
                break
              fi
              RETRIES=$((RETRIES + 1))
              echo "Directus not ready yet (attempt $RETRIES/5)..."
              sleep 15
            done
            if [ $RETRIES -eq 5 ]; then
              echo "Directus: UNHEALTHY after 5 retries"
              docker logs --tail 20 incomex-directus 2>&1
              exit 1
            fi

            # Test new token works via internal network
            HTTP_CODE=$(docker exec incomex-directus wget -q -O /dev/null \
              --header="Authorization: Bearer ${NEW_DIRECTUS_ADMIN_TOKEN}" \
              "http://localhost:8055/items/meta_catalog?limit=1" 2>&1 && echo "200" || echo "FAIL")
            echo "New token test: $HTTP_CODE"

            # Test Agent Data health
            echo "Waiting 45s for Agent Data warm-up..."
            sleep 45
            if curl -sf -o /dev/null https://vps.incomexsaigoncorp.vn/api/health 2>/dev/null; then
              echo "Agent Data: HEALTHY"
            else
              echo "Agent Data: UNHEALTHY"
              docker logs --tail 10 incomex-agent-data 2>&1
              exit 1
            fi

            echo ""
            echo "=== Rotation Complete ==="
