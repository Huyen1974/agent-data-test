name: "S135A: Create GSM Directus Secrets"

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  create-secrets:
    name: Read VPS → Create GSM Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Read Directus secrets from VPS
        id: read_secrets
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 1m
          capture_stdout: true
          script: |
            # Output in KEY=VALUE format for parsing
            grep -E "^DIRECTUS_(KEY|SECRET|ADMIN_TOKEN)=" /opt/incomex/docker/.env

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Directus secrets on GSM
        run: |
          set -euo pipefail
          PROJECT="github-chatgpt-ggcloud"

          # Parse the captured output
          STDOUT='${{ steps.read_secrets.outputs.stdout }}'

          DIRECTUS_KEY=$(echo "$STDOUT" | grep "^DIRECTUS_KEY=" | cut -d= -f2-)
          DIRECTUS_SECRET=$(echo "$STDOUT" | grep "^DIRECTUS_SECRET=" | cut -d= -f2-)
          DIRECTUS_ADMIN_TOKEN=$(echo "$STDOUT" | grep "^DIRECTUS_ADMIN_TOKEN=" | cut -d= -f2-)

          echo "Values found:"
          echo "DIRECTUS_KEY: ${DIRECTUS_KEY:0:4}..."
          echo "DIRECTUS_SECRET: ${DIRECTUS_SECRET:0:4}..."
          echo "DIRECTUS_ADMIN_TOKEN: ${DIRECTUS_ADMIN_TOKEN:0:4}..."

          # Create secrets on GSM
          for SECRET_NAME in DIRECTUS_KEY DIRECTUS_SECRET DIRECTUS_ADMIN_TOKEN; do
            eval SECRET_VALUE="\$$SECRET_NAME"
            if [ -z "$SECRET_VALUE" ]; then
              echo "WARNING: $SECRET_NAME is empty, skipping"
              continue
            fi

            # Check if secret already exists
            if gcloud secrets describe "$SECRET_NAME" --project="$PROJECT" >/dev/null 2>&1; then
              echo "$SECRET_NAME already exists, adding new version"
              printf '%s' "$SECRET_VALUE" | gcloud secrets versions add "$SECRET_NAME" --data-file=- --project="$PROJECT"
            else
              echo "Creating $SECRET_NAME"
              printf '%s' "$SECRET_VALUE" | gcloud secrets create "$SECRET_NAME" --data-file=- --project="$PROJECT"
            fi
          done

          echo ""
          echo "=== Verification ==="
          gcloud secrets list --project="$PROJECT" --format="value(name)" | grep -i directus || echo "No DIRECTUS secrets found"
