name: Deploy Agent Data to VPS

on:
  push:
    branches: [main]
    paths:
      - 'agent_data/**'
      - 'dot/**'
      - 'Dockerfile'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/deploy-vps.yml'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Sync code to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='tests' --exclude='.cursor' --exclude='.ci' --exclude='terraform' --exclude='functions' --exclude='api-service' --exclude='scripts'
          path: ./
          remote_path: /opt/incomex/docker/agent-data-repo/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Build & Deploy on VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        env:
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          envs: PG_PASSWORD
          script: |
            set -euo pipefail
            cd /opt/incomex/docker/agent-data-repo

            echo "=== Building Docker image ==="
            docker build -t agent-data-local:latest .

            echo ""
            echo "=== Updating docker-compose ==="
            cd /opt/incomex/docker
            python3 -c "
            import yaml, os
            with open('docker-compose.yml') as f:
                dc = yaml.safe_load(f)
            svc = dc['services']['agent-data']
            old_image = svc.get('image', '(none)')
            svc['image'] = 'agent-data-local:latest'
            env = svc.get('environment', {})
            if isinstance(env, list):
                env_dict = {}
                for item in env:
                    k, v = item.split('=', 1)
                    env_dict[k] = v
                env = env_dict
            env['PORT'] = '8000'
            env['PG_HOST'] = 'postgres'
            env['PG_PORT'] = '5432'
            env['PG_USER'] = 'incomex'
            env['PG_PASSWORD'] = os.environ['PG_PASSWORD']
            env['PG_DATABASE'] = 'incomex_metadata'
            svc['environment'] = env
            with open('docker-compose.yml', 'w') as f:
                yaml.dump(dc, f, default_flow_style=False, sort_keys=False)
            print(f'Image: {old_image} -> agent-data-local:latest')
            print('PG env vars configured')
            "

            echo ""
            echo "=== Deploying ==="
            docker compose up -d --no-build --force-recreate agent-data

            # Agent Data needs 35-45s warm-up for search to work
            echo "Waiting 45s for warm-up..."
            sleep 45

            echo ""
            echo "=== Health Checks ==="
            FAILED=0

            # Check container health
            if docker exec incomex-agent-data python -c 'import urllib.request; urllib.request.urlopen("http://localhost:8000/info")' 2>/dev/null; then
              echo "Agent Data /info: HEALTHY"
            else
              echo "Agent Data /info: UNHEALTHY"
              FAILED=1
            fi

            # Check via nginx (full path)
            if curl -sf -o /dev/null https://vps.incomexsaigoncorp.vn/api/health 2>/dev/null; then
              echo "Nginx → Agent Data: HEALTHY"
            else
              echo "Nginx → Agent Data: UNHEALTHY"
              FAILED=1
            fi

            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" | grep incomex-agent-data

            # Post-deploy: document count sanity check
            DOC_COUNT=$(curl -sf https://vps.incomexsaigoncorp.vn/api/health | python3 -c "import sys,json; print(json.load(sys.stdin)['data_integrity']['document_count'])" 2>/dev/null || echo 0)
            echo "Document count: $DOC_COUNT"
            if [[ $DOC_COUNT -lt 100 ]]; then
              echo "Document count too low: $DOC_COUNT (expected >=100)"
              FAILED=1
            fi

            # Post-deploy: vector integrity check (TD-131)
            HEALTH_JSON=$(curl -sf https://vps.incomexsaigoncorp.vn/api/health 2>/dev/null || echo '{}')
            SYNC_STATUS=$(echo "$HEALTH_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data_integrity',{}).get('sync_status','unknown'))" 2>/dev/null || echo "unknown")
            VEC_RATIO=$(echo "$HEALTH_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data_integrity',{}).get('ratio',0))" 2>/dev/null || echo "0")
            echo "Vector sync_status: $SYNC_STATUS (ratio: $VEC_RATIO)"
            if [[ "$SYNC_STATUS" == "critical" ]]; then
              echo "::error::Vector sync is critical (ratio=$VEC_RATIO). Run POST /kb/audit-sync with auto_heal=true."
              FAILED=1
            fi

            if [[ $FAILED -ne 0 ]]; then
              echo "::error::Post-deploy checks failed. Service may be unhealthy."
              exit 1
            fi

            echo "=== Deploy complete ==="
