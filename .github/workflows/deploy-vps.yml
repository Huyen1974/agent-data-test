name: Deploy Agent Data to VPS

on:
  push:
    branches: [main]
    paths:
      - 'agent_data/**'
      - 'Dockerfile'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/deploy-vps.yml'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build & Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/incomex/docker/agent-data-repo

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main
            echo "Commit: $(git log -1 --oneline)"

            echo ""
            echo "=== Building Docker image ==="
            docker build -t agent-data-local:latest .

            echo ""
            echo "=== Deploying ==="
            cd /opt/incomex/docker
            docker compose up -d --no-build agent-data

            # Agent Data needs 35-45s warm-up for search to work
            echo "Waiting 45s for warm-up..."
            sleep 45

            echo ""
            echo "=== Health Checks ==="
            FAILED=0

            # Check container health
            if docker exec incomex-agent-data python -c 'import urllib.request; urllib.request.urlopen("http://localhost:8000/info")' 2>/dev/null; then
              echo "Agent Data /info: HEALTHY"
            else
              echo "Agent Data /info: UNHEALTHY"
              FAILED=1
            fi

            # Check via nginx (full path)
            if curl -sf -o /dev/null https://vps.incomexsaigoncorp.vn/api/health 2>/dev/null; then
              echo "Nginx → Agent Data: HEALTHY"
            else
              echo "Nginx → Agent Data: UNHEALTHY"
              FAILED=1
            fi

            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" | grep incomex-agent-data

            # Post-deploy: document count sanity check
            DOC_COUNT=$(curl -sf https://vps.incomexsaigoncorp.vn/api/health | python3 -c "import sys,json; print(json.load(sys.stdin)['data_integrity']['document_count'])" 2>/dev/null || echo 0)
            echo "Document count: $DOC_COUNT"
            if [[ $DOC_COUNT -lt 100 ]]; then
              echo "Document count too low: $DOC_COUNT (expected >=100)"
              FAILED=1
            fi

            if [[ $FAILED -ne 0 ]]; then
              echo "::error::Post-deploy checks failed. Service may be unhealthy."
              exit 1
            fi

            echo "=== Deploy complete ==="
