name: Artifact Registry CD (DISABLED)

# DISABLED: Migration S109 — now deploying directly to VPS
# See deploy-vps.yml for the active deployment workflow
# Keeping file for reference; remove after migration verified stable

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to run legacy AR build (emergency only)"
        required: true

concurrency:
  group: artifact-registry-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  AR_REPO: agent-data
  SERVICE: agent-data-test

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker Image
        shell: bash
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${SERVICE}"
          docker buildx build \
            --platform linux/amd64 \
            -t "$IMAGE:${GITHUB_SHA}" \
            -t "$IMAGE:latest" \
            --push .
