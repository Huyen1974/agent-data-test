name: Data Lifecycle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # 01:00 UTC nightly

jobs:
  orphan-vector-check:
    name: Orphan Vector Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Run orphan vector check
        env:
          AGENT_DATA_URL: https://vps.incomexsaigoncorp.vn/api
          AGENT_DATA_KEY: ${{ secrets.AGENT_DATA_API_KEY }}
        run: |
          python scripts/check_orphan_vectors.py
