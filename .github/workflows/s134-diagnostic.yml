name: "S134: VPS Diagnostic"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    name: Check VPS State
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            echo "=== Docker containers ==="
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== Docker compose services ==="
            cd /opt/incomex/docker
            docker compose ps

            echo ""
            echo "=== docker-compose.yml (agent-data section) ==="
            python3 -c "
            import yaml
            with open('docker-compose.yml') as f:
                dc = yaml.safe_load(f)
            svc = dc['services'].get('agent-data', {})
            print('image:', svc.get('image'))
            env = svc.get('environment', {})
            if isinstance(env, dict):
                for k, v in env.items():
                    if 'PASSWORD' in k or 'KEY' in k or 'SECRET' in k:
                        print(f'{k}: ***')
                    else:
                        print(f'{k}: {v}')
            elif isinstance(env, list):
                for item in env:
                    k = item.split('=')[0]
                    if 'PASSWORD' in k or 'KEY' in k or 'SECRET' in k:
                        print(f'{k}=***')
                    else:
                        print(item)
            "

            echo ""
            echo "=== Docker networks ==="
            docker network ls

            echo ""
            echo "=== Agent Data container networks ==="
            docker inspect incomex-agent-data --format '{{json .NetworkSettings.Networks}}' | python3 -m json.tool 2>/dev/null || echo "container not found"

            echo ""
            echo "=== Postgres container check ==="
            docker ps -a --filter "name=postgres" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"

            echo ""
            echo "=== Agent Data logs (last 30 lines) ==="
            docker logs --tail 30 incomex-agent-data 2>&1

            echo ""
            echo "=== PG connectivity from agent-data ==="
            docker exec incomex-agent-data python3 -c "
            import os
            print('PG_HOST:', os.getenv('PG_HOST', '(not set)'))
            print('PG_PORT:', os.getenv('PG_PORT', '(not set)'))
            print('PG_USER:', os.getenv('PG_USER', '(not set)'))
            print('PG_DATABASE:', os.getenv('PG_DATABASE', '(not set)'))
            print('PG_PASSWORD:', '***' if os.getenv('PG_PASSWORD') else '(not set)')
            from agent_data import pg_store
            try:
                pg_store.init_pool()
                ok, ms = pg_store.probe()
                print(f'probe: ok={ok}, latency={ms:.1f}ms')
            except Exception as e:
                print(f'init_pool failed: {e}')
            " 2>&1

            echo ""
            echo "=== Postgres container credentials ==="
            docker exec postgres printenv POSTGRES_USER 2>/dev/null || echo "POSTGRES_USER: (not set)"
            docker exec postgres printenv POSTGRES_DB 2>/dev/null || echo "POSTGRES_DB: (not set)"
            echo "POSTGRES_PASSWORD: $(docker exec postgres printenv POSTGRES_PASSWORD 2>/dev/null | head -c 3)***" || echo "POSTGRES_PASSWORD: (not set)"

            echo ""
            echo "=== Postgres databases ==="
            docker exec postgres psql -U postgres -c "\l" 2>/dev/null || echo "Cannot list databases"

            echo ""
            echo "=== Postgres users ==="
            docker exec postgres psql -U postgres -c "\du" 2>/dev/null || echo "Cannot list users"

            echo ""
            echo "=== Check incomex_metadata tables ==="
            docker exec postgres psql -U postgres -d incomex_metadata -c "\dt" 2>/dev/null || echo "Cannot list tables"

            echo ""
            echo "=== Docker network inspect (DNS) ==="
            docker network inspect docker_incomex --format '{{range .Containers}}{{.Name}}: {{.IPv4Address}}{{"\n"}}{{end}}' 2>/dev/null || echo "Cannot inspect network"
