name: "S135D: Fix 403 + Restart Services"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fix:
    name: Restart Nuxt + Verify
    runs-on: ubuntu-latest
    steps:
      - name: Restart and verify
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /opt/incomex/docker

            echo "=== Restarting Nuxt to clear SSR cache ==="
            docker compose restart nuxt
            echo "Waiting 30s..."
            sleep 30

            echo ""
            echo "=== Health checks ==="
            echo -n "Nuxt: "
            curl -s -o /dev/null -w "%{http_code}" https://vps.incomexsaigoncorp.vn/
            echo ""

            echo -n "Directus: "
            curl -s -o /dev/null -w "%{http_code}" https://directus.incomexsaigoncorp.vn/server/health
            echo ""

            echo -n "Agent Data: "
            curl -s -o /dev/null -w "%{http_code}" https://vps.incomexsaigoncorp.vn/api/health
            echo ""

            echo ""
            echo "=== Public API checks (no token) ==="
            echo -n "meta_catalog: "
            curl -s -o /dev/null -w "%{http_code}" "https://directus.incomexsaigoncorp.vn/items/meta_catalog?limit=1"
            echo ""
            echo -n "dot_tools: "
            curl -s -o /dev/null -w "%{http_code}" "https://directus.incomexsaigoncorp.vn/items/dot_tools?limit=1"
            echo ""

            echo ""
            echo "=== Registries page content ==="
            PAGE=$(curl -s https://vps.incomexsaigoncorp.vn/knowledge/registries)
            echo "CAT- count: $(echo "$PAGE" | grep -oc 'CAT-' || echo 0)"
            echo "FORBIDDEN count: $(echo "$PAGE" | grep -oc 'FORBIDDEN' || echo 0)"
            echo "SYS- count: $(echo "$PAGE" | grep -oc 'SYS-' || echo 0)"

            echo ""
            echo "=== Container status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | head -10
