name: "S135A: Read VPS Credentials"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  read:
    name: Read VPS Credentials
    runs-on: ubuntu-latest
    steps:
      - name: Read credentials from VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 2m
          script: |
            set -euo pipefail

            echo "=== Postgres container env ==="
            echo "POSTGRES_USER: $(docker exec postgres printenv POSTGRES_USER 2>/dev/null || echo '(not set)')"
            echo "POSTGRES_DB: $(docker exec postgres printenv POSTGRES_DB 2>/dev/null || echo '(not set)')"
            PW=$(docker exec postgres printenv POSTGRES_PASSWORD 2>/dev/null || echo '')
            echo "POSTGRES_PASSWORD prefix: ${PW:0:8}..."

            echo ""
            echo "=== Postgres users and databases ==="
            docker exec postgres psql -U postgres -c "\du" 2>/dev/null || echo "Cannot list users"
            docker exec postgres psql -U postgres -c "\l" 2>/dev/null || echo "Cannot list databases"

            echo ""
            echo "=== Agent Data container PG env ==="
            docker exec incomex-agent-data printenv | grep -E "^PG_" | sed 's/PG_PASSWORD=.*/PG_PASSWORD=***/' || echo "(no PG vars)"

            echo ""
            echo "=== Docker service names (for PG_HOST) ==="
            docker compose -f /opt/incomex/docker/docker-compose.yml config --services 2>/dev/null || echo "Cannot list services"

            echo ""
            echo "=== Qdrant API key ==="
            QK=$(docker exec incomex-qdrant printenv QDRANT__SERVICE__API_KEY 2>/dev/null || echo '')
            if [ -n "$QK" ]; then
              echo "QDRANT__SERVICE__API_KEY prefix: ${QK:0:12}..."
            else
              echo "QDRANT__SERVICE__API_KEY: (not set)"
            fi

            echo ""
            echo "=== Directus env (from .env or container) ==="
            docker exec incomex-directus printenv | grep -E "^(KEY|SECRET|ADMIN_)" | sed 's/=.*/=***/' || echo "(no directus vars)"
            # Also check .env file
            echo "--- From /opt/incomex/docker/.env ---"
            grep -E "^DIRECTUS_" /opt/incomex/docker/.env 2>/dev/null | sed 's/=.*/=***/' || echo "(no DIRECTUS_ in .env)"
            grep -E "^(KEY|SECRET|ADMIN_)" /opt/incomex/docker/.env 2>/dev/null | sed 's/=.*/=***/' || echo "(no KEY/SECRET in .env)"

            echo ""
            echo "=== Docker compose agent-data env ==="
            python3 -c "
            import yaml
            with open('/opt/incomex/docker/docker-compose.yml') as f:
                dc = yaml.safe_load(f)
            svc = dc['services'].get('agent-data', {})
            env = svc.get('environment', {})
            if isinstance(env, dict):
                for k, v in sorted(env.items()):
                    if any(s in k.upper() for s in ['PASSWORD', 'KEY', 'SECRET', 'TOKEN']):
                        print(f'{k}: ***')
                    else:
                        print(f'{k}: {v}')
            "

            echo ""
            echo "=== Directus docker-compose env ==="
            python3 -c "
            import yaml
            with open('/opt/incomex/docker/docker-compose.yml') as f:
                dc = yaml.safe_load(f)
            svc = dc['services'].get('directus', {})
            env = svc.get('environment', {})
            if isinstance(env, dict):
                for k, v in sorted(env.items()):
                    if any(s in k.upper() for s in ['PASSWORD', 'KEY', 'SECRET', 'TOKEN']):
                        print(f'{k}: ***')
                    else:
                        print(f'{k}: {v}')
            elif isinstance(env, list):
                for item in sorted(env):
                    k = item.split('=')[0]
                    if any(s in k.upper() for s in ['PASSWORD', 'KEY', 'SECRET', 'TOKEN']):
                        print(f'{k}=***')
                    else:
                        print(item)
            "
