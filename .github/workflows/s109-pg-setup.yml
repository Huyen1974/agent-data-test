name: "S109: PostgreSQL Setup on VPS"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    name: Configure PG & Import Data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync scripts to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: ./scripts/
          remote_path: /opt/incomex/docker/agent-data-repo/scripts/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add PG env vars & import data
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            echo "=== Step 1: Add PG env vars to docker-compose.yml ==="
            cd /opt/incomex/docker

            # Check if PG_HOST is already in the agent-data service
            if grep -q "PG_HOST" docker-compose.yml; then
              echo "PG env vars already present in docker-compose.yml"
            else
              echo "Adding PG env vars to agent-data service..."
              # Use python to safely modify the YAML
              python3 -c "
            import yaml, sys
            with open('docker-compose.yml') as f:
                dc = yaml.safe_load(f)
            svc = dc['services']['agent-data']
            env = svc.get('environment', {})
            if isinstance(env, list):
                env_dict = {}
                for item in env:
                    k, v = item.split('=', 1)
                    env_dict[k] = v
                env = env_dict
            env['PG_HOST'] = 'postgres'
            env['PG_PORT'] = '5432'
            env['PG_USER'] = 'incomex'
            env['PG_PASSWORD'] = 'Incomex2026PG_306ac539ad365fce'
            env['PG_DATABASE'] = 'incomex_metadata'
            svc['environment'] = env
            with open('docker-compose.yml', 'w') as f:
                yaml.dump(dc, f, default_flow_style=False, sort_keys=False)
            print('PG env vars added successfully')
            "
            fi

            echo ""
            echo "=== Step 2: Restart agent-data with PG env vars ==="
            docker compose up -d --no-build agent-data
            echo "Waiting 30s for warm-up..."
            sleep 30

            echo ""
            echo "=== Step 3: Check PostgreSQL connectivity ==="
            docker exec incomex-agent-data python -c "
            from agent_data import pg_store
            pg_store.init_pool()
            ok, ms = pg_store.probe()
            print(f'PostgreSQL probe: ok={ok}, latency={ms:.1f}ms')
            assert ok, 'PostgreSQL probe failed'
            "

            echo ""
            echo "=== Step 4: Run data import ==="
            # Copy import script into running agent-data container
            docker cp /opt/incomex/docker/agent-data-repo/scripts/import_firestore_to_pg.py incomex-agent-data:/tmp/import_firestore_to_pg.py

            # Create backup dir in container and copy backup data
            if [ -d /opt/incomex/backups/gcp-pre-migration/firestore ]; then
              docker exec incomex-agent-data mkdir -p /opt/incomex/backups/gcp-pre-migration
              docker cp /opt/incomex/backups/gcp-pre-migration/firestore incomex-agent-data:/opt/incomex/backups/gcp-pre-migration/firestore
            fi

            # Run import from agent-data container (has psycopg2 + network access to postgres)
            docker exec -e PG_HOST=postgres incomex-agent-data python3 /tmp/import_firestore_to_pg.py 2>&1

            echo ""
            echo "=== Step 5: Verify document count ==="
            docker exec incomex-postgres psql -U incomex -d incomex_metadata -c "SELECT count(*) FROM kb_documents;" 2>&1

            echo ""
            echo "=== Step 6: Restart agent-data to pick up data ==="
            cd /opt/incomex/docker
            docker compose restart agent-data
            echo "Waiting 45s for warm-up..."
            sleep 45

            echo ""
            echo "=== Step 7: Final health check ==="
            curl -sf https://vps.incomexsaigoncorp.vn/api/health | python3 -m json.tool

            DOC_COUNT=$(curl -sf https://vps.incomexsaigoncorp.vn/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data_integrity',{}).get('document_count',0) if d.get('data_integrity') else 0)" 2>/dev/null || echo 0)
            echo ""
            echo "Document count: $DOC_COUNT"

            PG_STATUS=$(curl -sf https://vps.incomexsaigoncorp.vn/api/health | python3 -c "import sys,json; print(json.load(sys.stdin)['services']['postgres']['status'])" 2>/dev/null || echo "unknown")
            echo "PostgreSQL status: $PG_STATUS"

            echo ""
            echo "=== Setup complete ==="
