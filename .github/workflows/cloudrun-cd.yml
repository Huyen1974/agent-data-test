name: Cloud Run CD

on:
  push:
    branches: [main]
    paths:
      - 'agent_data/**'
      - 'Dockerfile'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/cloudrun-cd.yml'
  workflow_dispatch:

concurrency:
  group: cloudrun-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  AR_REPO: agent-data
  SERVICE: agent-data-test

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker Image
        shell: bash
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${SERVICE}"
          docker buildx build \
            --platform linux/amd64 \
            -t "$IMAGE:${GITHUB_SHA}" \
            -t "$IMAGE:latest" \
            --push .

      - name: Deploy to Cloud Run
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${SERVICE}:${GITHUB_SHA}"

          for attempt in 1 2 3; do
            if gcloud run deploy "$SERVICE" \
              --image "$IMAGE" \
              --region "$REGION" \
              --platform managed \
              --no-allow-unauthenticated \
              --memory 1Gi \
              --quiet; then
              echo "Deploy succeeded on attempt $attempt"
              break
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "WARN: deploy attempt $attempt failed; retrying in 10s..."
              sleep 10
            else
              echo "ERROR: deploy failed after $attempt attempts"
              exit 1
            fi
          done
