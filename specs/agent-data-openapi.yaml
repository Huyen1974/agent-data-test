openapi: 3.1.0
info:
  title: Agent Data Knowledge Manager API
  version: 1.0.0
  description: |
    Langroid-based RAG (Retrieval-Augmented Generation) API for knowledge management.

    This API provides:
    - **Knowledge Retrieval**: Query knowledge base using natural language (RAG with Qdrant vector search)
    - **Document Management**: CRUD operations for knowledge documents
    - **Document Ingestion**: Ingest documents from GCS or inline text
    - **Documentation Proxy**: Access GitHub-hosted documentation

    ## Authentication (S27)

    Protected endpoints require the `X-API-Key` header. The API key value corresponds to the
    `agent-data-api-key` secret stored in **Google Secret Manager** (project: `mpc-rag-langroid`).

    Public endpoints (health, info, chat, ingest) do not require authentication.

    ## Vector Search (S25)

    The `/chat` endpoint performs semantic search using:
    - **Embedding Model**: OpenAI `text-embedding-3-small`
    - **Vector Store**: Qdrant Cloud
    - **Chunking**: 4000 chars with 400 char overlap
    - **Top-K**: Default 5, configurable 1-20

    ## Metadata (S26)

    All document operations return structured metadata including:
    - `source`: Original file path or URL
    - `tags`: Classification tags array
    - `title`: Human-readable title
    - `tenant_id`: Multi-tenant isolation key

  contact:
    name: AI Platform Team
    email: ai-platform@incomexsaigoncorp.vn
  license:
    name: Proprietary
    url: https://ai.incomexsaigoncorp.vn/terms

servers:
  - url: https://agent-data-test-pfne2mqwja-as.a.run.app
    description: Production (Cloud Run - Asia Southeast)
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Health
    description: Service health and information endpoints
  - name: Knowledge
    description: Knowledge base query and retrieval (S25)
  - name: Documents
    description: Document CRUD operations (requires API key)
  - name: Ingest
    description: Document ingestion pipeline
  - name: Docs
    description: GitHub documentation proxy

paths:
  /:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Health check (root)
      description: Returns service health status including Langroid availability
      security: []  # Public endpoint
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                version: "1.0.0"
                langroid_available: true

  /health:
    get:
      tags: [Health]
      operationId: healthCheckAlias
      summary: Health check (alias)
      description: Alias for root health check endpoint
      security: []  # Public endpoint
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /info:
    get:
      tags: [Health]
      operationId: getSystemInfo
      summary: Get system information
      description: Returns detailed system information and configuration
      security: []  # Public endpoint
      responses:
        '200':
          description: System information retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfo'
              example:
                app_name: agent-data
                environment: test
                qdrant_collection: test_documents
                langroid_version: "0.58.0"

  /chat:
    post:
      tags: [Knowledge]
      operationId: queryKnowledge
      summary: Query knowledge base (RAG)
      security: []  # Public endpoint
      description: |
        Performs semantic search against the knowledge base using RAG (Retrieval-Augmented Generation).

        ## Vector Search (S25)

        This endpoint:
        1. Embeds the query using OpenAI `text-embedding-3-small`
        2. Searches Qdrant vector store for top-k similar chunks
        3. Passes context to LLM for response generation
        4. Returns response with source citations

        ## Metadata in Response (S26)

        The `context` array contains retrieved chunks with full metadata:
        - `document_id`: Unique document identifier
        - `snippet`: Relevant text excerpt
        - `score`: Similarity score (0-1, higher = more relevant)
        - `metadata`: Source information including file path, tags, title

        ## Graceful Degradation

        If Qdrant is unavailable, falls back to:
        1. Firestore KB collection streaming
        2. Last ingested text
        3. Empty context (LLM responds without RAG)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            examples:
              simple:
                summary: Simple query
                value:
                  query: "What is the approval workflow?"
              advanced:
                summary: Advanced query with filters
                value:
                  query: "How do I configure authentication?"
                  filters:
                    tags: ["security", "auth"]
                  top_k: 10
                  context_hints:
                    preferred_format: markdown
                    language: vi
      responses:
        '200':
          description: Query processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
              example:
                response: "The approval workflow consists of 3 stages..."
                content: "The approval workflow consists of 3 stages..."
                session_id: "sess_abc123"
                context:
                  - document_id: "doc_001"
                    snippet: "Stage 1: Draft submission by AI agent..."
                    score: 0.92
                    metadata:
                      title: "Workflow Guide"
                      source: "gs://bucket/docs/workflow.md"
                      tags: ["workflow", "approval"]
                usage:
                  latency_ms: 1250
                  qdrant_hits: 5
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingest:
    post:
      tags: [Ingest]
      operationId: ingestDocument
      summary: Ingest document
      security: []  # Public endpoint
      description: |
        Ingests a document into the knowledge base. Accepts either:
        - **GCS URI**: `gs://bucket/path/to/file` - Publishes to Pub/Sub for async processing
        - **Inline text**: Raw text content - Stores directly to Firestore KB collection

        Processing is asynchronous. The endpoint returns immediately with 202 Accepted.

        ## Processing Pipeline

        1. **GCS URI**: Sent to Pub/Sub topic → Cloud Function processes → Firestore + Qdrant
        2. **Inline text**: Stored to Firestore KB → Best-effort sync to Qdrant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
            examples:
              gcs:
                summary: GCS document
                value:
                  text: "gs://mpc-rag-langroid/knowledge/policy.pdf"
              inline:
                summary: Inline text
                value:
                  text: "This is the document content to ingest..."
                  session_id: "sess_abc123"
      responses:
        '202':
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
              example:
                response: "Ingestion request accepted"
                content: "Ingestion request accepted"
                session_id: "sess_abc123"
                context: []
                usage: null

  /documents:
    post:
      tags: [Documents]
      operationId: createDocument
      summary: Create document
      description: |
        Creates a new document in the knowledge base.

        ## Metadata (S26)

        The `metadata` field supports arbitrary key-value pairs for classification:
        - `title`: Human-readable document title
        - `tags`: Array of classification tags
        - `source`: Original source path or URL
        - Custom fields as needed

        ## Vector Sync

        After creation, the document is automatically chunked and indexed in Qdrant.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
            example:
              document_id: "doc_policy_001"
              parent_id: "folder_policies"
              content:
                mime_type: "text/markdown"
                body: "# Policy Document\n\nThis is the policy content..."
              metadata:
                title: "Company Policy v2"
                tags: ["policy", "hr", "guidelines"]
                source: "gs://bucket/policies/policy_v2.md"
              is_human_readable: true
      responses:
        '201':
          description: Document created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentMutationResponse'
              example:
                id: "doc_policy_001"
                status: created
                revision: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /documents/{doc_id}:
    put:
      tags: [Documents]
      operationId: updateDocument
      summary: Update document
      description: |
        Updates an existing document. Supports partial updates via `update_mask`.

        ## Update Mask

        Specify which fields to update:
        - `["content"]` - Update only content
        - `["metadata"]` - Update only metadata
        - `["content", "metadata"]` - Update both

        ## Revision Control

        Optionally provide `last_known_revision` to detect concurrent modifications.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/DocIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
            example:
              document_id: "doc_policy_001"
              patch:
                content:
                  mime_type: "text/markdown"
                  body: "# Updated Policy\n\nNew content..."
                metadata:
                  title: "Company Policy v3"
              update_mask: ["content", "metadata"]
              last_known_revision: 1
      responses:
        '200':
          description: Document updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentMutationResponse'
              example:
                id: "doc_policy_001"
                status: updated
                revision: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Revision conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Documents]
      operationId: deleteDocument
      summary: Delete document
      description: |
        Soft-deletes a document by setting `deleted_at` timestamp.
        The document is removed from Qdrant vector store.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/DocIdPath'
      responses:
        '200':
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentMutationResponse'
              example:
                id: "doc_policy_001"
                status: deleted
                revision: 3
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /documents/{doc_id}/move:
    post:
      tags: [Documents]
      operationId: moveDocument
      summary: Move document
      description: |
        Moves a document to a new parent in the hierarchy.
        Includes cycle detection (max 100 steps).
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/DocIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveDocumentRequest'
            example:
              new_parent_id: "folder_archive"
      responses:
        '200':
          description: Document moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentMutationResponse'
              example:
                id: "doc_policy_001"
                status: moved
                revision: 4
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          description: Cycle detected or invalid parent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/docs/tree:
    get:
      tags: [Docs]
      operationId: getDocsTree
      summary: Get documentation tree
      security: []  # Public endpoint
      description: |
        Returns a tree structure of documentation files from GitHub repository.
        Caches results for 5 minutes.
      parameters:
        - name: ref
          in: query
          description: Git branch, tag, or commit SHA
          schema:
            type: string
            default: main
        - name: path
          in: query
          description: Directory path to list
          schema:
            type: string
            default: docs/
      responses:
        '200':
          description: Documentation tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocsTreeResponse'
              example:
                ref: main
                path: docs/
                items:
                  - name: architecture
                    path: docs/architecture
                    type: dir
                    sha: abc123
                  - name: README.md
                    path: docs/README.md
                    type: file
                    sha: def456
                    size: 1024
                    source_id: docs/README.md

  /api/docs/file:
    get:
      tags: [Docs]
      operationId: getDocsFile
      summary: Get documentation file
      security: []  # Public endpoint
      description: |
        Returns the content of a documentation file from GitHub.
        Content is base64 decoded and returned as UTF-8 text.
      parameters:
        - name: path
          in: query
          required: true
          description: File path
          schema:
            type: string
        - name: ref
          in: query
          description: Git branch, tag, or commit SHA
          schema:
            type: string
            default: main
      responses:
        '200':
          description: File content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocsFileResponse'
              example:
                path: docs/README.md
                ref: main
                sha: def456
                content: "# Documentation\n\nWelcome to the docs..."
                size: 1024

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key for authenticated endpoints.

        ## Secret Management (S27)

        The API key value is stored in **Google Secret Manager**:
        - **Project**: `mpc-rag-langroid`
        - **Secret Name**: `agent-data-api-key`
        - **Environment Variable**: `API_KEY`

        Contact the AI Platform team to obtain access credentials.

  parameters:
    DocIdPath:
      name: doc_id
      in: path
      required: true
      description: Document ID
      schema:
        type: string
        minLength: 1

  responses:
    Unauthorized:
      description: Invalid or missing API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: Invalid API key

    Forbidden:
      description: API key not configured on server
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: API key is not configured

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: Document not found

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        langroid_available:
          type: boolean

    SystemInfo:
      type: object
      properties:
        app_name:
          type: string
        environment:
          type: string
        qdrant_collection:
          type: string
        langroid_version:
          type: string
      additionalProperties: true

    ChatRequest:
      type: object
      properties:
        query:
          type: string
          description: Question to ask the knowledge base
        text:
          type: string
          description: Legacy alias for query
        message:
          type: string
          description: Legacy alias for query
        filters:
          $ref: '#/components/schemas/QueryFilters'
        top_k:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
          description: Number of context chunks to retrieve (S25)
        context_hints:
          $ref: '#/components/schemas/ContextHints'
        routing:
          $ref: '#/components/schemas/RoutingOptions'
        session_id:
          type: string
          description: Session ID for conversation history

    QueryFilters:
      type: object
      description: Filters for vector search (S25)
      properties:
        tags:
          type: array
          items:
            type: string
          description: Filter by document tags
        tenant_id:
          type: string
          description: Filter by tenant (multi-tenant isolation)

    ContextHints:
      type: object
      properties:
        preferred_format:
          type: string
          enum: [markdown, plain]
          default: markdown
        language:
          type: string
          description: Preferred response language (e.g., "vi", "en")

    RoutingOptions:
      type: object
      properties:
        allow_external_search:
          type: boolean
          default: false
          description: Allow web search fallback
        max_latency_ms:
          type: integer
          default: 4000
          description: Maximum latency threshold
        noop_qdrant:
          type: boolean
          default: false
          description: Skip Qdrant search (for testing)

    ChatResponse:
      type: object
      required: [response, content]
      properties:
        response:
          type: string
          description: Generated response from LLM
        content:
          type: string
          description: Alias for response
        session_id:
          type: string
          description: Session ID for conversation tracking
        context:
          type: array
          items:
            $ref: '#/components/schemas/ContextEntry'
          description: Retrieved context chunks with metadata (S25, S26)
        usage:
          $ref: '#/components/schemas/QueryUsage'

    ContextEntry:
      type: object
      description: |
        Retrieved context chunk with metadata (S26).
        Contains the source information for citations.
      properties:
        document_id:
          type: string
          description: Unique document identifier
        snippet:
          type: string
          description: Relevant text excerpt
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Similarity score (higher = more relevant)
        metadata:
          $ref: '#/components/schemas/DocumentMetadata'

    DocumentMetadata:
      type: object
      description: |
        Document metadata schema (S26).
        Used for classification, filtering, and citation.
      properties:
        title:
          type: string
          description: Human-readable document title
        tags:
          type: array
          items:
            type: string
          description: Classification tags
        source:
          type: string
          description: Original source path (e.g., GCS URI, URL)
        tenant_id:
          type: string
          description: Tenant ID for multi-tenant isolation
        page_number:
          type: integer
          description: Page number (for paginated sources)
        timestamp:
          type: string
          format: date-time
          description: Document timestamp
      additionalProperties: true

    QueryUsage:
      type: object
      description: Query performance metrics
      properties:
        latency_ms:
          type: integer
          description: Total query latency in milliseconds
        qdrant_hits:
          type: integer
          description: Number of vectors retrieved from Qdrant

    IngestRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: |
            Document content or GCS URI (gs://bucket/path).
            - GCS URI: Async processing via Pub/Sub
            - Inline text: Direct storage to Firestore
        message:
          type: string
          description: Legacy alias for text
        session_id:
          type: string
          description: Session ID for tracking

    IngestResponse:
      type: object
      properties:
        response:
          type: string
        content:
          type: string
        session_id:
          type: string
        context:
          type: array
          items: {}
        usage:
          oneOf:
            - type: object
            - type: 'null'

    CreateDocumentRequest:
      type: object
      required: [document_id, content]
      properties:
        document_id:
          type: string
          description: Unique document identifier
        parent_id:
          type: string
          description: Parent document ID (for hierarchy)
        content:
          $ref: '#/components/schemas/DocumentContent'
        metadata:
          $ref: '#/components/schemas/DocumentMetadata'
        is_human_readable:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time

    UpdateDocumentRequest:
      type: object
      required: [document_id, patch]
      properties:
        document_id:
          type: string
        patch:
          type: object
          properties:
            content:
              $ref: '#/components/schemas/DocumentContent'
            metadata:
              $ref: '#/components/schemas/DocumentMetadata'
            is_human_readable:
              type: boolean
        update_mask:
          type: array
          items:
            type: string
            enum: [content, metadata, is_human_readable]
        last_known_revision:
          type: integer
          description: For optimistic locking

    MoveDocumentRequest:
      type: object
      required: [new_parent_id]
      properties:
        new_parent_id:
          type: string
          description: New parent document ID

    DocumentContent:
      type: object
      required: [mime_type, body]
      properties:
        mime_type:
          type: string
          enum: [text/markdown, text/plain, application/json]
        body:
          type: string
          description: Document content

    DocumentMutationResponse:
      type: object
      required: [id, status, revision]
      properties:
        id:
          type: string
          description: Document ID
        status:
          type: string
          enum: [created, updated, moved, deleted]
        revision:
          type: integer
          description: Current revision number

    DocsTreeResponse:
      type: object
      properties:
        ref:
          type: string
        path:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocsTreeItem'

    DocsTreeItem:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [file, dir]
        sha:
          type: string
        size:
          type: integer
        source_id:
          type: string

    DocsFileResponse:
      type: object
      properties:
        path:
          type: string
        ref:
          type: string
        sha:
          type: string
        content:
          type: string
          description: File content (base64 decoded)
        size:
          type: integer

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Error message
