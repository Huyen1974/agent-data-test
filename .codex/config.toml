# Codex CLI MCP configuration for Agent Data
# HTTP transport to VPS Agent Data MCP endpoint
# Set AGENT_DATA_API_KEY env var before running: export AGENT_DATA_API_KEY="your-key"

[mcp_servers.agent-data]
url = "https://vps.incomexsaigoncorp.vn/api/mcp"
env_http_headers = { "X-API-Key" = "AGENT_DATA_API_KEY" }
